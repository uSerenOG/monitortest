name: pokemon-monitor

on:
  schedule:
    # Every 5 minutes = GitHub's minimum. Real runs are often delayed 5-30 min
    # and can be dropped under high load - this is best-effort, not real-time.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}        # adds a manual "Run workflow" button

permissions:
  contents: write              # needed to commit state.json back to the repo

concurrency:
  group: monitor
  cancel-in-progress: false    # queue overlapping runs so they don't race on state.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build
        run: mvn -B -q package

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          KEYWORD: pokemon
        run: java -jar target/pokemon-monitor.jar

      - name: Commit updated state
        run: |
          git config user.name  "monitor-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update state [skip ci]"
          git push
